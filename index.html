<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteig Números 1-25</title>
    <style>
        /* Fons animat cool */
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenidor principal transparent */
        .container {
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitol {
            color: #aebcbf;
            margin-bottom: 30px;
        }

        /* Botons */
        .botones {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(45deg, #3a7bd5, #00d2ff);
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.6);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        button.reset {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
        }
        button.reset:hover {
            box-shadow: 0 8px 20px rgba(255, 75, 43, 0.6);
        }

        /* Contenidor de totes les graelles */
        #graellesContainer {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding-bottom: 40px;
        }

        /* Cada Graella (Dia) */
        .graella-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            animation: slideDown 0.5s ease-out forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .titol-dia {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(0, 210, 255, 0.3);
            padding-bottom: 10px;
            display: inline-block;
        }

        /* Pilars dins de la graella */
        .pilars-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .pilar {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 150px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pilar-header {
            background: linear-gradient(180deg, #3a7bd5, #00d2ff);
            padding: 10px 0;
            font-weight: bold;
            font-size: 1.1em;
            text-transform: uppercase;
        }

        .pilar-body {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 8px;
        }

        /* Slots de persones */
        .persona-slot {
            height: 45px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.2);
            opacity: 0;
            transform: scale(0);
        }

        .persona-slot.filled {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            border: 1px solid #38ef7d;
            color: white;
            box-shadow: 0 0 10px rgba(56, 239, 125, 0.4);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(180deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(-10deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .nota {
            margin-top: 20px;
            font-style: italic;
            color: #8b9bb3;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .pilar { width: 100px; }
            .persona-slot { height: 35px; font-size: 16px; }
            h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Números 1 - 25</h1>
    <div class="subtitol">Cada dia reparteix 25 números en 5 racós diferents.</div>

    <div class="botones">
        <button id="btnSorteig" onclick="sorteigDia()">Sorteig del Dia</button>
        <button class="reset" id="btnNovaBaralla" onclick="novaBaralla()" disabled>Nova baralla</button>
    </div>
    
    <div class="nota">
        "Que es faça un sorteig de 'Nova baralla' per a quan ja han passat per tots."
    </div>
</div>

<!-- Aquí s'afegiran les diferents graelles (Dies) -->
<div id="graellesContainer"></div>

<script>
    let diaActual = 1;
    const TOTAL_DIES = 5;

    function sorteigDia() {
        if (diaActual > TOTAL_DIES) {
            alert("Ja s'han fet els 5 dies! Prem 'Nova baralla' per començar de nou.");
            return;
        }

        // Crear array del 1 al 25 i barallar-ho
        let numeros = Array.from({length: 25}, (_, i) => i + 1);
        numeros.sort(() => Math.random() - 0.5);

        // Crear la nova graella per al dia actual
        const container = document.getElementById('graellesContainer');
        const graella = document.createElement('div');
        graella.className = 'graella-card';
        graella.innerHTML = `
            <div class="titol-dia">Dia ${diaActual}</div>
            <div class="pilars-container" id="pilars-${diaActual}"></div>
        `;
        
        // Posar la graella al principi de tot (el dia més nou a dalt)
        container.prepend(graella);

        const pilarsContainer = document.getElementById(`pilars-${diaActual}`);

        // Crear els 5 racós
        for(let r = 1; r <= 5; r++) {
            let pilar = document.createElement('div');
            pilar.className = 'pilar';
            pilar.innerHTML = `
                <div class="pilar-header">Racó ${r}</div>
                <div class="pilar-body" id="pilar-body-${r}"></div>
            `;
            pilarsContainer.appendChild(pilar);
            
            let body = pilar.querySelector('.pilar-body');

            // Posar 5 números (persones) a cada racó
            for(let p = 0; p < 5; p++) {
                let num = numeros.pop(); // Treure l'últim número de la llista barallada
                let slot = document.createElement('div');
                slot.className = 'persona-slot';
                slot.innerText = num;
                body.appendChild(slot);

                // Animació escalonada (un darrere l'altre)
                let delay = (r - 1) * 100 + p * 50;
                setTimeout(() => {
                    slot.classList.add('filled');
                }, delay);
            }
        }

        diaActual++;

        // Comprovar si ja hem acabat els 5 dies
        if (diaActual > TOTAL_DIES) {
            document.getElementById('btnNovaBaralla').disabled = false;
            document.getElementById('btnSorteig').disabled = true;
        }
    }

    function novaBaralla() {
        // Netejar totes les graelles
        document.getElementById('graellesContainer').innerHTML = '';
        diaActual = 1;
        document.getElementById('btnNovaBaralla').disabled = true;
        document.getElementById('btnSorteig').disabled = false;
    }
</script>

</body>
</html>
