<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Hologràfica: Mates i Llengua</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            /* Fons profund que canvia de color amb transició */
            background-color: #050508;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            transition: background-color 1.5s ease;
        }

        /* Fons Canvas (Constel·lacions i Símbols) */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: rgba(10, 10, 20, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255,255,255,0.05);
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        h1 {
            margin: 0 0 25px 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7), 0 0 20px rgba(0, 255, 255, 0.5);
            transition: text-shadow 1s ease;
        }

        /* Sistema de Pestanyes */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tab-btn {
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            color: #bdc3c7;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .tab-btn.active.mates {
            border-color: #00ffff;
            color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4), inset 0 0 10px rgba(0, 255, 255, 0.2);
        }
        .tab-btn.active.llengua {
            border-color: #ff00ff;
            color: #ff00ff;
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4), inset 0 0 10px rgba(255, 0, 255, 0.2);
        }

        .subtitol {
            font-family: 'Caveat', cursive;
            font-size: 1.8em;
            color: #ffffff;
            margin-bottom: 25px;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        button {
            font-family: 'Poppins', sans-serif;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        /* Botons amb efecte hologràfic */
        #mates-content button:not(.reset) {
            background: linear-gradient(45deg, #00ffff, #0077ff);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
        #llengua-content button:not(.reset) {
            background: linear-gradient(45deg, #ff00ff, #ff5500);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
        }

        button:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        button:disabled {
            background: #2c3e50 !important;
            color: #7f8c8d !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none;
        }

        button.reset {
            background: transparent;
            border: 2px solid #e74c3c;
            color: #e74c3c;
        }
        button.reset:hover {
            background: #e74c3c;
            color: #fff;
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.6);
        }

        .grids-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding-bottom: 40px;
        }

        .graella-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(5px);
            animation: slideDown 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .titol-dia {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
            display: inline-block;
        }

        .pilars-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .pilar {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            width: 160px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pilar-header {
            padding: 12px 0;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
        }
        
        #mates-content .pilar-header { 
            background: rgba(0, 255, 255, 0.15); 
            border-bottom: 1px solid rgba(0, 255, 255, 0.4);
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.8);
        }
        #llengua-content .pilar-header { 
            background: rgba(255, 0, 255, 0.15); 
            border-bottom: 1px solid rgba(255, 0, 255, 0.4);
            text-shadow: 0 0 5px rgba(255, 0, 255, 0.8);
        }

        .pilar-body {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 8px;
        }

        .persona-slot {
            height: 50px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            color: transparent;
            opacity: 0;
            transform: scale(0);
        }

        .persona-slot.filled {
            background: rgba(0, 255, 0, 0.15);
            border: 1px solid #00ff00;
            color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4), inset 0 0 10px rgba(0, 255, 0, 0.1);
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(180deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(-10deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .nota {
            margin-top: 20px;
            font-family: 'Caveat', cursive;
            font-size: 1.5em;
            color: #bdc3c7;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            .pilar { width: 110px; }
            .persona-slot { height: 40px; font-size: 18px; }
            h1 { font-size: 1.8em; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
    <h1 id="titolPrincipal">Aula Hologràfica</h1>
    
    <div class="tabs">
        <button class="tab-btn mates active" onclick="canviarPestanya('mates')">Matemàtiques</button>
        <button class="tab-btn llengua" onclick="canviarPestanya('llengua')">Llengua</button>
    </div>

    <!-- CONTINGUT MATEMÀTIQUES -->
    <div id="mates-content">
        <div class="subtitol">Sorteig de Racós (1 al 25)</div>
        <div class="controls">
            <button id="btnSorteig-mates" onclick="jocMates.sorteigDia()">Sorteig del Dia</button>
            <button class="reset" id="btnNovaBaralla-mates" onclick="jocMates.novaBaralla(true)">Nova baralla</button>
        </div>
        <div class="grids-container" id="graelles-mates"></div>
    </div>

    <!-- CONTINGUT LLENGUA -->
    <div id="llengua-content" style="display: none;">
        <div class="subtitol">Sorteig de Racós (1 al 25)</div>
        <div class="controls">
            <button id="btnSorteig-llengua" onclick="jocLlengua.sorteigDia()">Sorteig del Dia</button>
            <button class="reset" id="btnNovaBaralla-llengua" onclick="jocLlengua.novaBaralla(true)">Nova baralla</button>
        </div>
        <div class="grids-container" id="graelles-llengua"></div>
    </div>

    <div class="nota">
        "Que es faça un sorteig de 'Nova baralla' per a quan ja han passat per tots."
    </div>
</div>

<script>
    // --- CLASSE PER GESTIONAR EL JOC DE CADA ASSIGNATURA ---
    class SorteigAssignatura {
        constructor(assignatura, containerId, btnSorteigId, btnResetId) {
            this.assignatura = assignatura;
            this.containerId = containerId;
            this.btnSorteig = document.getElementById(btnSorteigId);
            this.btnReset = document.getElementById(btnResetId);
            this.diaActual = 1;
            this.barallesRacos = [[], [], [], [], []];
            this.historialResultats = [];
            this.TOTAL_DIES = 5;
            this.carregarEstat();
        }

        carregarEstat() {
            const savedData = localStorage.getItem('sorteig_' + this.assignatura);
            if (savedData) {
                const data = JSON.parse(savedData);
                this.diaActual = data.diaActual;
                this.barallesRacos = data.barallesRacos;
                this.historialResultats = data.historialResultats;
                this.renderitzarHistorial();
                
                if (this.diaActual > this.TOTAL_DIES) {
                    this.btnReset.disabled = false;
                    this.btnSorteig.disabled = true;
                }
            } else {
                this.novaBaralla(false);
            }
        }

        guardarProgres() {
            const data = {
                diaActual: this.diaActual,
                barallesRacos: this.barallesRacos,
                historialResultats: this.historialResultats
            };
            localStorage.setItem('sorteig_' + this.assignatura, JSON.stringify(data));
        }

        inicialitzarBaralles() {
            for(let i = 0; i < 5; i++) {
                this.barallesRacos[i] = Array.from({length: 25}, (_, idx) => idx + 1);
                this.barallesRacos[i].sort(() => Math.random() - 0.5);
            }
        }

        sorteigDia() {
            if (this.diaActual > this.TOTAL_DIES) return;

            let resultatsDia = [];
            for(let r = 0; r < 5; r++) {
                let racoActual = [];
                for(let p = 0; p < 5; p++) {
                    let num = this.barallesRacos[r].pop();
                    racoActual.push(num);
                }
                resultatsDia.push(racoActual);
            }
            
            this.historialResultats.push(resultatsDia);
            this.renderitzarGraella(this.diaActual, resultatsDia, true);
            
            this.diaActual++;
            if (this.diaActual > this.TOTAL_DIES) {
                this.btnReset.disabled = false;
                this.btnSorteig.disabled = true;
            }
            
            this.guardarProgres();
        }

        renderitzarHistorial() {
            const container = document.getElementById(this.containerId);
            container.innerHTML = '';
            this.historialResultats.forEach((res, index) => {
                this.renderitzarGraella(index + 1, res, false);
            });
        }

        renderitzarGraella(dia, resultatsDia, animar) {
            const container = document.getElementById(this.containerId);
            const graella = document.createElement('div');
            graella.className = 'graella-card';
            graella.innerHTML = `
                <div class="titol-dia">Dia ${dia}</div>
                <div class="pilars-container"></div>
            `;
            container.prepend(graella);
            
            const pilarsContainer = graella.querySelector('.pilars-container');

            for(let r = 0; r < 5; r++) {
                let pilar = document.createElement('div');
                pilar.className = 'pilar';
                pilar.innerHTML = `
                    <div class="pilar-header">Racó ${r + 1}</div>
                    <div class="pilar-body"></div>
                `;
                pilarsContainer.appendChild(pilar);
                
                let body = pilar.querySelector('.pilar-body');

                for(let p = 0; p < 5; p++) {
                    let num = resultatsDia[r][p];
                    let slot = document.createElement('div');
                    slot.className = 'persona-slot';
                    slot.innerText = num;
                    body.appendChild(slot);

                    if(animar) {
                        let delay = (r) * 100 + p * 50;
                        setTimeout(() => {
                            slot.classList.add('filled');
                        }, delay);
                    } else {
                        slot.classList.add('filled');
                        slot.style.opacity = '1';
                        slot.style.transform = 'scale(1)';
                    }
                }
            }
        }

        novaBaralla(esNetejaManual) {
            if (esNetejaManual) {
                localStorage.removeItem('sorteig_' + this.assignatura);
            }
            
            document.getElementById(this.containerId).innerHTML = '';
            this.diaActual = 1;
            this.historialResultats = [];
            this.inicialitzarBaralles();
            this.btnReset.disabled = true;
            this.btnSorteig.disabled = false;
            
            this.guardarProgres();
        }
    }

    // Iniciar les dues instàncies
    const jocMates = new SorteigAssignatura('mates', 'graelles-mates', 'btnSorteig-mates', 'btnNovaBaralla-mates');
    const jocLlengua = new SorteigAssignatura('llengua', 'graelles-llengua', 'btnSorteig-llengua', 'btnNovaBaralla-llengua');


    // --- CANVI DE PESTANYES ---
    let pestanyaActual = 'mates';
    function canviarPestanya(novaPestanya) {
        pestanyaActual = novaPestanya;
        document.getElementById('mates-content').style.display = novaPestanya === 'mates' ? 'block' : 'none';
        document.getElementById('llengua-content').style.display = novaPestanya === 'llengua' ? 'block' : 'none';

        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.tab-btn.${novaPestanya}`).classList.add('active');

        // Canviar el color del títol segons l'assignatura
        const titol = document.getElementById('titolPrincipal');
        if (novaPestanya === 'mates') {
            titol.style.textShadow = '0 0 10px rgba(0, 255, 255, 0.7), 0 0 20px rgba(0, 255, 255, 0.5)';
            document.body.style.backgroundColor = '#050510';
        } else {
            titol.style.textShadow = '0 0 10px rgba(255, 0, 255, 0.7), 0 0 20px rgba(255, 0, 255, 0.5)';
            document.body.style.backgroundColor = '#100510';
        }
    }


    // --- FONS ANIMAT COOL (CONSTEL·LACIÓ + SÍMBOLS HOLOGRÀFICS) ---
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let nodes = [];
    let simbols = [];

    const simbolsMates = ['+', '-', '=', 'π', '√', '∑', 'Δ', '∞', '÷', 'x', '%', '∫'];
    const simbolsLlengua = ['A', 'B', 'C', 'ç', 'ñ', '·', 'a', 'e', 'i', 'o', 'u', '?', '¡', '¿', ','];
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Xarxa de punts (Constel·lació)
    class Node {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.speedX = (Math.random() - 0.5) * 0.5;
            this.speedY = (Math.random() - 0.5) * 0.5;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
            if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
        }
        draw() {
            let color = pestanyaActual === 'mates' ? '0, 255, 255' : '255, 0, 255';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${color}, 0.8)`;
            ctx.shadowBlur = 10;
            ctx.shadowColor = `rgba(${color}, 1)`;
            ctx.fill();
            ctx.shadowBlur = 0; // Reset
        }
    }

    // Símbols surant amb glow
    class SimbolHolo {
        constructor() {
            this.reset(true);
        }
        reset(inicial = false) {
            this.x = Math.random() * canvas.width;
            this.y = inicial ? Math.random() * canvas.height : -50;
            this.size = Math.random() * 40 + 20;
            this.speedY = Math.random() * 0.4 + 0.1;
            this.speedX = (Math.random() - 0.5) * 0.3;
            
            let arr = pestanyaActual === 'mates' ? simbolsMates : simbolsLlengua;
            // 20% de probabilitat de barrejar l'altra assignatura
            if (Math.random() < 0.2) arr = pestanyaActual === 'mates' ? simbolsLlengua : simbolsMates;
            this.char = arr[Math.floor(Math.random() * arr.length)];
            
            this.color = pestanyaActual === 'mates' ? '0, 255, 255' : '255, 0, 255';
            if (Math.random() < 0.3) this.color = '255, 255, 255'; // Algun blanc per variar
            
            this.opacity = Math.random() * 0.3 + 0.1;
            this.rotation = Math.random() * Math.PI;
            this.rotSpeed = (Math.random() - 0.5) * 0.01;
        }
        update() {
            this.y += this.speedY;
            this.x += this.speedX;
            this.rotation += this.rotSpeed;
            if (this.y > canvas.height + 50) this.reset();
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.font = `${this.size}px 'Orbitron', sans-serif`;
            ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
            ctx.shadowBlur = 20;
            ctx.shadowColor = `rgba(${this.color}, 0.8)`;
            ctx.fillText(this.char, 0, 0);
            ctx.restore();
            ctx.shadowBlur = 0;
        }
    }

    function initBackgroundElements() {
        nodes = [];
        simbols = [];
        let numNodes = (canvas.width * canvas.height) / 20000;
        let numSimbols = (canvas.width * canvas.height) / 40000;
        
        for (let i = 0; i < numNodes; i++) nodes.push(new Node());
        for (let i = 0; i < numSimbols; i++) simbols.push(new SimbolHolo());
    }

    function drawConnections() {
        let color = pestanyaActual === 'mates' ? '0, 255, 255' : '255, 0, 255';
        for (let a = 0; a < nodes.length; a++) {
            for (let b = a + 1; b < nodes.length; b++) {
                let dist = Math.hypot(nodes[a].x - nodes[b].x, nodes[a].y - nodes[b].y);
                if (dist < 150) {
                    let opacity = 1 - (dist / 150);
                    ctx.strokeStyle = `rgba(${color}, ${opacity * 0.3})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(nodes[a].x, nodes[a].y);
                    ctx.lineTo(nodes[b].x, nodes[b].y);
                    ctx.stroke();
                }
            }
        }
    }

    function animateBg() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawConnections();
        nodes.forEach(n => { n.update(); n.draw(); });
        simbols.forEach(s => { s.update(); s.draw(); });
        requestAnimationFrame(animateBg);
    }

    window.addEventListener('resize', initBackgroundElements);
    initBackgroundElements();
    animateBg();

</script>

</body>
</html>
